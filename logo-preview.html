<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f0f0f0; gap: 48px; padding: 60px; }
.card { background: white; border-radius: 16px; padding: 48px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
.dark { background: #0C1B2A; }
h3 { font-family: 'Playfair Display', serif; margin: 0 0 24px; color: #333; font-size: 18px; }
h3.light { color: #F7F8FA; }
</style>
</head>
<body>

<div class="card" style="max-width: 500px;">
  <h3>Large Preview (200px)</h3>
  <div style="width: 200px; height: 200px; border-radius: 50%; background: #0C1B2A; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 0 2px #D4AF6E;">
    <div style="position: absolute; inset: 6px; border-radius: 50%; border: 1px solid rgba(212,175,110,0.3);"></div>
    <img src="lion-gold.png" style="width: 72%; height: 72%; object-fit: contain;">
  </div>
</div>

<div class="card">
  <h3>Nav Logo (44px) — Light Background</h3>
  <div style="display: flex; align-items: center; gap: 14px; justify-content: center;">
    <div style="width: 44px; height: 44px; border-radius: 50%; background: #0C1B2A; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 0 1px #D4AF6E;">
      <img src="lion-gold.png" style="width: 72%; height: 72%; object-fit: contain;">
    </div>
    <div>
      <div style="font-family: 'Playfair Display', serif; font-weight: 600; font-size: 17px; color: #0C1B2A; letter-spacing: 0.04em; line-height: 1.1;">CEYLON SUBSTRATES</div>
      <div style="font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: #7A8A96; font-weight: 500; margin-top: 2px;">Premium Coir Products</div>
    </div>
  </div>
</div>

<div class="card dark">
  <h3 class="light">Footer Logo — Dark Background</h3>
  <div style="display: flex; align-items: center; gap: 12px; justify-content: center;">
    <div style="width: 40px; height: 40px; border-radius: 50%; background: #1A3148; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 0 1px #D4AF6E;">
      <img src="lion-gold.png" style="width: 72%; height: 72%; object-fit: contain;">
    </div>
    <span style="font-family: 'Playfair Display', serif; font-weight: 600; font-size: 17px; color: #F7F8FA; letter-spacing: 0.04em;">CEYLON SUBSTRATES</span>
  </div>
</div>

</body>
</html>
